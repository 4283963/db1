server:
  port: 8080

spring:
  application:
    name: cart-server
  datasource:
    url: jdbc:postgresql://localhost:5432/factory_cart_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    com.factory.cart: DEBUG
    org.hibernate.SQL: DEBUG
